    <!-- Critical CSS - inlined for instant render -->

      /* Prevent flash by setting background immediately */
      html, body {
        margin: 0;

        display: flex;

        justify-content: center;

        text-align: center;

        transition: opacity 0.08s ease-out;

        opacity: 0;
        pointer-events: none;

        font-size: 2rem;
        margin: 0 0 1rem;
        font-weight: 700;

        height: 32px;

        animation: spin 0.8s linear infinite;
        margin-top: 1.5rem;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <!-- Inline script to fade out loader when React is ready -->
    <script>

        var loader = document.querySelector('.initial-loader');
        if (loader) {
          loader.classList.add('fade-out');
          setTimeout(function() { loader.remove(); }, 80);
        }
      };

        <h1 style="color: #FF6B35;">Baby Simulator — AI Parenting Game</h1>
        <p style="font-size: 1.15rem;">Baby Simulator is a free, AI-powered text-based simulation game where you raise a virtual child from birth to age 18. Every parenting decision you make shapes your child's personality, interests, relationships, and future career.</p>
        <p><strong>Please enable JavaScript to play this game.</strong></p>

        <h2>How it works</h2>
        <p>You start by choosing a starting scenario or letting the AI generate one for you — a family background, financial situation, and a newborn child with their own traits. From there, the game presents key parenting moments year by year. At each decision point you pick how to respond, and the AI generates the consequences: how your child develops, what challenges arise, and how your relationship evolves over 18 years.</p>

        <h2>Game features</h2>
        <ul>
          <li>AI-generated family backgrounds, storylines, and dialogue tailored to your choices</li>
          <li>18 years of parenting decisions spanning infancy, childhood, adolescence, and young adulthood</li>
          <li>AI-generated portraits of your child at different ages</li>
          <li>Endings that reflect the cumulative impact of your parenting style</li>
          <li>Shareable ending cards summarizing your playthrough</li>
          <li>Available in English, Simplified Chinese, Japanese, and Spanish</li>
          <li>Free core gameplay; premium AI models and image generation use optional credits</li>
          <li>No account required — progress saves to your browser automatically</li>
        </ul>

        <h2>Who it's for</h2>
        <p>Baby Simulator is designed for anyone curious about the choices, tradeoffs, and emotional texture of raising a child. It's used by prospective parents thinking through scenarios, students exploring developmental psychology, and players who enjoy narrative life-simulation games like The Sims, BitLife, or Choices.</p>
